document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

span><\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--faint);\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12h4l2.5 7 5-15 2.5 8H21\"><\u002Fpath><\u002Fsvg><span style=\"font:600 10px Inter;\">Activity<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--faint);\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"4\" width=\"6.5\" height=\"6.5\" rx=\"1.6\"><\u002Frect><rect x=\"13.5\" y=\"4\" width=\"6.5\" height=\"6.5\" rx=\"1.6\"><\u002Frect><rect x=\"4\" y=\"13.5\" width=\"6.5\" height=\"6.5\" rx=\"1.6\"><\u002Frect><rect x=\"13.5\" y=\"13.5\" width=\"6.5\" height=\"6.5\" rx=\"1.6\"><\u002Frect><\u002Fsvg><span style=\"font:600 10px Inter;\">Categories<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--faint);\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"3.4\"><\u002Fcircle><path d=\"M5.5 19.5a6.5 6.5 0 0 1 13 0\"><\u002Fpath><\u002Fsvg><span style=\"font:600 10px Inter;\">You<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:138px;height:5px;border-radius:3px;background:var(--ink);opacity:.22;z-index:6;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== THE SETUP ===================== -->\n  <section style=\"padding:104px 40px;\">\n    <div style=\"max-width:720px;margin:0 auto;\">\n      <div style=\"font:600 13px Inter;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);margin-bottom:20px;\">The setup<\u002Fdiv>\n      <p style=\"font:500 25px Inter;line-height:1.5;color:var(--ink);margin:0 0 28px;letter-spacing:-.01em;\">When I was a kid, money was a thing you could hold.<\u002Fp>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 24px;\">You'd get a hundred-rupee note for something, fold it into your pocket, and feel it sitting there. At the shop, you'd hand it over and watch it leave your hand. Your wallet got lighter in a way you could actually feel. You always knew, more or less, how much you had — because money had weight.<\u002Fp>\n      <p style=\"font:600 22px Inter;line-height:1.6;color:var(--ink);margin:0 0 24px;letter-spacing:-.01em;\">Then UPI came along, and money stopped having weight.<\u002Fp>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 24px;\">Now you just tap. A chai here. A cab there. A late-night food order. A QR code at a stall whose name you'll never know. Tap, tap, tap, all day long. It's fast, it's brilliant, and it's completely invisible.<\u002Fp>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0;\">And invisible money has a strange side effect.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== THE MONTH-END MYSTERY ===================== -->\n  <section style=\"background:var(--bg);padding:104px 40px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);\">\n    <div style=\"max-width:720px;margin:0 auto;\">\n      <div style=\"font:600 13px Inter;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);margin-bottom:20px;\">The problem<\u002Fdiv>\n      <h2 style=\"font:800 38px Inter;line-height:1.12;letter-spacing:-.025em;color:var(--ink);margin:0 0 28px;\">The month-end mystery<\u002Fh2>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 24px;\">You know the moment. It's the end of the month, you open your banking app, and the balance is lower than it should be. You sit there trying to remember where it all went, and… you can't. Not because you blew it on one big thing. Because you bled it out in a hundred tiny taps you forgot the second they happened.<\u002Fp>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 24px;\">A ₹39 chai. A ₹220 auto. A ₹149 food order. One more subscription. A few campus taps. By the time the month ends, your balance has a story you simply cannot read.<\u002Fp>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0;\">And here's the part that always bothered me the most: people <em>blame themselves<\u002Fem> for this. They decide they're \"bad with money\" or that they \"have no discipline.\" But that's not what's happening. The truth is gentler than that.<\u002Fp>\n      <blockquote style=\"margin:48px 0 0;padding:4px 0 4px 26px;border-left:3px solid var(--attention);font:600 30px Inter;line-height:1.36;letter-spacing:-.015em;color:var(--ink);\">You're not bad with money. Nobody ever gave you a way to see where it went.<\u002Fblockquote>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== TWO BAD OPTIONS ===================== -->\n  <section style=\"padding:104px 40px;\">\n    <div style=\"max-width:720px;margin:0 auto;\">\n      <div style=\"font:600 13px Inter;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);margin-bottom:20px;\">Why no one has fixed it<\u002Fdiv>\n      <h2 style=\"font:800 38px Inter;line-height:1.12;letter-spacing:-.025em;color:var(--ink);margin:0 0 28px;\">Two bad options<\u002Fh2>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 32px;\">So I looked at what already exists. And everyone trying to fix this hands you one of two bad deals.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:18px;margin-bottom:32px;\">\n        <div style=\"background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:26px 28px;box-shadow:0 1px 2px rgba(20,24,31,.04),0 8px 22px rgba(20,24,31,.04);\">\n          <div style=\"font:700 14px Inter;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;\">The first deal<\u002Fdiv>\n          <div style=\"font:700 21px Inter;color:var(--ink);margin-bottom:10px;letter-spacing:-.01em;\">Log everything yourself.<\u002Fdiv>\n          <p style=\"font:400 18px Inter;line-height:1.7;color:#3a4049;margin:0;\">Every payment, by hand, into an app. It works for about two weeks. Then life gets busy, you miss a day, then a week, and one evening you quietly delete the app. Most people who start tracking quit within three weeks.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:26px 28px;box-shadow:0 1px 2px rgba(20,24,31,.04),0 8px 22px rgba(20,24,31,.04);\">\n          <div style=\"font:700 14px Inter;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;\">The second deal<\u002Fdiv>\n          <div style=\"font:700 21px Inter;color:var(--ink);margin-bottom:10px;letter-spacing:-.01em;\">Let the app guess.<\u002Fdiv>\n          <p style=\"font:400 18px Inter;line-height:1.7;color:#3a4049;margin:0;\">It reads the text your bank sends after every payment and tries to sort it. Sounds perfect — except the message usually doesn't say the shop's name. It says something like <span style=\"font-family:'Roboto Mono',monospace;font-size:15px;background:var(--fill);padding:2px 7px;border-radius:6px;\">razorpay@hdfcbank<\u002Fspan>. That's like a receipt that just says \"a shop.\" So the app guesses, the guesses are wrong often enough, and you stop trusting it.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0;\">Do all the work yourself, or trust a machine that's half wrong. That's the choice today. No wonder nobody's solved this for real.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== THE GOOD FRIEND (DARK) ===================== -->\n  <section style=\"background:#16181d;padding:108px 40px;\">\n    <div style=\"max-width:760px;margin:0 auto;\">\n      <div style=\"font:600 13px Inter;letter-spacing:.18em;text-transform:uppercase;color:#7e8696;margin-bottom:22px;\">The idea<\u002Fdiv>\n      <h2 style=\"font:800 44px Inter;line-height:1.1;letter-spacing:-.03em;color:#fff;margin:0 0 32px;\">What if the app behaved like a good friend?<\u002Fh2>\n      <p style=\"font:400 20px Inter;line-height:1.78;color:#c4c9d2;margin:0 0 24px;\">This was the question that unlocked it for me.<\u002Fp>\n      <p style=\"font:400 20px Inter;line-height:1.78;color:#c4c9d2;margin:0 0 24px;\">Think about a friend who's good with these things. They don't follow you around demanding to know what every payment was. They notice. They remember. And on the rare occasion they truly can't tell, they just ask — once — and then they never have to ask again.<\u002Fp>\n      <p style=\"font:600 22px Inter;line-height:1.6;color:#fff;margin:0 0 24px;letter-spacing:-.01em;\">That's the whole idea. An app that behaves like that friend.<\u002Fp>\n      <p style=\"font:400 20px Inter;line-height:1.78;color:#c4c9d2;margin:0;\">It lives quietly in your phone. Every time you pay, your bank sends you that little text — \"₹300 paid.\" The app reads it over your shoulder. It can't climb inside Google Pay or PhonePe — those doors are locked to outsiders — but it doesn't need to. The text is enough. That's how it sees everything you spend, without you lifting a finger.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== HOW IT WORKS ===================== -->\n  <section style=\"padding:104px 40px 64px;\">\n    <div style=\"max-width:720px;margin:0 auto;\">\n      <div style=\"font:600 13px Inter;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);margin-bottom:20px;\">How it works<\u002Fdiv>\n      <h2 style=\"font:800 38px Inter;line-height:1.12;letter-spacing:-.025em;color:var(--ink);margin:0 0 14px;\">In plain words<\u002Fh2>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 40px;\">Six rules do all the work. Together they're the difference between an app you keep and one you delete.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:0;\">\n        <div style=\"display:flex;gap:22px;padding:26px 0;border-top:1px solid var(--line);\"><div style=\"flex:none;width:34px;font:700 18px Manrope;color:var(--primary);\">01<\u002Fdiv><div><div style=\"font:700 20px Inter;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em;\">It only acts when it's sure.<\u002Fdiv><p style=\"font:400 18px Inter;line-height:1.7;color:#3a4049;margin:0;\">When the app can clearly tell what a payment was, it files it silently and you never notice. When it can't, it doesn't pretend — it stops and waits. A confident wrong answer is worse than an honest \"I don't know\"; a wrong guess quietly poisons your whole record.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:22px;padding:26px 0;border-top:1px solid var(--line);\"><div style=\"flex:none;width:34px;font:700 18px Manrope;color:var(--primary);\">02<\u002Fdiv><div><div style=\"font:700 20px Inter;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em;\">It asks gently, and almost never.<\u002Fdiv><p style=\"font:400 18px Inter;line-height:1.7;color:#3a4049;margin:0;\">It will never ping you the instant you pay — that's how you train someone to mute you forever. Instead it quietly collects the few payments it's unsure about and shows them in one small batch when you next open the app. One tap each. No typing.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:22px;padding:26px 0;border-top:1px solid var(--line);\"><div style=\"flex:none;width:34px;font:700 18px Manrope;color:var(--primary);\">03<\u002Fdiv><div><div style=\"font:700 20px Inter;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em;\">It only ever asks once.<\u002Fdiv><p style=\"font:400 18px Inter;line-height:1.7;color:#3a4049;margin:0;\">The first time you tell it \"that payment was for my dog,\" it remembers that shop. From then on, every payment there sorts itself. Week by week it asks you less and less. The longer you use it, the quieter it gets — the opposite of every nagging tracker you've ever deleted.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:22px;padding:26px 0;border-top:1px solid var(--line);\"><div style=\"flex:none;width:34px;font:700 18px Manrope;color:var(--primary);\">04<\u002Fdiv><div><div style=\"font:700 20px Inter;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em;\">It learns your words.<\u002Fdiv><p style=\"font:400 18px Inter;line-height:1.7;color:#3a4049;margin:0;\">You might type \"pet\" one day, \"vet\" the next, \"dog food\" after that. A dumb app makes three separate piles. This one understands they all mean the same thing and keeps them in one pile called Pets. You never set up a single category — it builds them out of your own language.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:22px;padding:26px 0;border-top:1px solid var(--line);\"><div style=\"flex:none;width:34px;font:700 18px Manrope;color:var(--primary);\">05<\u002Fdiv><div><div style=\"font:700 20px Inter;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em;\">And it has manners.<\u002Fdiv><p style=\"font:400 18px Inter;line-height:1.7;color:#3a4049;margin:0;\">Send money to a friend and it won't count it as spending — that's money moving, not a purchase. Spend ₹39 on tea it can't identify and it won't bother you; too small to matter. And if you start ignoring its questions, it takes the hint and asks even less, instead of pestering you harder.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:22px;padding:26px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);\"><div style=\"flex:none;width:34px;font:700 18px Manrope;color:var(--primary);\">06<\u002Fdiv><div><div style=\"font:700 20px Inter;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em;\">All of this happens inside your phone.<\u002Fdiv><p style=\"font:400 18px Inter;line-height:1.7;color:#3a4049;margin:0;\">Your messages never get sent anywhere. So when someone asks the obvious nervous question — \"wait, this app reads my texts?\" — the honest answer is: yes, but only on your own phone, and nothing ever leaves it.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== THE LEARNING ARC (TRIPTYCH) ===================== -->\n  <section style=\"background:var(--bg);padding:80px 40px 92px;border-top:1px solid var(--line);\">\n    <div style=\"max-width:1080px;margin:0 auto;\">\n      <div style=\"text-align:center;margin-bottom:56px;\">\n        <div style=\"font:600 13px Inter;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);margin-bottom:14px;\">The learning arc<\u002Fdiv>\n        <h2 style=\"font:800 32px Inter;line-height:1.2;letter-spacing:-.02em;color:var(--ink);margin:0;\">Ask once. Remember forever. Get quieter.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;gap:48px;flex-wrap:wrap;\">\n        <!-- Phone: Nudge -->\n        <div style=\"width:291px;display:flex;flex-direction:column;align-items:center;\">\n          <div style=\"width:291px;height:616px;\">\n            <div style=\"transform:scale(0.70);transform-origin:top left;\">\n              <div style=\"width:416px;height:880px;background:#0c0d10;border-radius:50px;padding:11px;box-shadow:0 2px 6px rgba(0,0,0,.12),0 24px 50px rgba(20,24,31,.18);position:relative;\">\n                <div style=\"width:100%;height:100%;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;display:flex;flex-direction:column;\">\n                  <div style=\"position:absolute;top:9px;left:50%;transform:translateX(-50%);width:104px;height:30px;background:#0c0d10;border-radius:16px;z-index:6;\"><\u002Fdiv>\n                  <div style=\"height:52px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0;\"><span style=\"font:600 15px Inter;color:#23272e;letter-spacing:-.01em;\">9:41<\u002Fspan><div style=\"display:flex;align-items:center;gap:7px;\"><svg width=\"18\" height=\"11\" viewBox=\"0 0 18 11\" fill=\"#23272e\"><rect x=\"0\" y=\"7\" width=\"3\" height=\"4\" rx=\"1\"><\u002Frect><rect x=\"5\" y=\"5\" width=\"3\" height=\"6\" rx=\"1\"><\u002Frect><rect x=\"10\" y=\"2.5\" width=\"3\" height=\"8.5\" rx=\"1\"><\u002Frect><rect x=\"15\" y=\"0\" width=\"3\" height=\"11\" rx=\"1\"><\u002Frect><\u002Fsvg><svg width=\"17\" height=\"12\" viewBox=\"0 0 17 12\" fill=\"#23272e\"><path d=\"M8.5 3.2c2.4 0 4.6.9 6.2 2.4l1.4-1.6A11 11 0 0 0 8.5 1 11 11 0 0 0 1.4 4l1.4 1.6A9 9 0 0 1 8.5 3.2zM8.5 6.6c1.4 0 2.7.5 3.7 1.4l1.4-1.6a8 8 0 0 0-10.2 0l1.4 1.6c1-.9 2.3-1.4 3.7-1.4zM8.5 10l2.1-2.4a4 4 0 0 0-4.2 0L8.5 10z\"><\u002Fpath><\u002Fsvg><svg width=\"26\" height=\"13\" viewBox=\"0 0 26 13\"><rect x=\"0.5\" y=\"0.5\" width=\"22\" height=\"12\" rx=\"3.5\" fill=\"none\" stroke=\"#23272e\" stroke-opacity=\".35\"><\u002Frect><rect x=\"2\" y=\"2\" width=\"17\" height=\"9\" rx=\"1.8\" fill=\"#23272e\"><\u002Frect><rect x=\"24\" y=\"4\" width=\"2\" height=\"5\" rx=\"1\" fill=\"#23272e\" fill-opacity=\".35\"><\u002Frect><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n                  <div style=\"flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px 22px 0;\">\n                    <div style=\"display:flex;flex-direction:column;gap:5px;\"><span style=\"font:700 21px Inter;color:var(--ink);letter-s 8 0-2.1-2-4.1-4.6-4.1z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;gap:2px;\"><span style=\"font:600 13.5px Inter;color:var(--ink);\">Pet shop<\u002Fspan><span style=\"font:400 11.5px Inter;color:var(--faint);\">June 3<\u002Fspan><\u002Fdiv><span style=\"font:600 14px Manrope;color:var(--ink);\">₹350<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:138px;height:5px;border-radius:3px;background:var(--ink);opacity:.22;z-index:6;\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;margin-top:18px;\"><div style=\"font:700 13px Manrope;color:var(--primary);\">03<\u002Fdiv><div style=\"font:600 16px Inter;color:var(--ink);margin-top:6px;\">Your words grow into a category<\u002Fdiv><div style=\"font:400 14px Inter;color:var(--muted);margin-top:4px;line-height:1.5;\">pet, vet, dog food — one pile you never set up.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== PULL QUOTE (ONE-LINER) ===================== -->\n  <section style=\"padding:96px 40px;\">\n    <div style=\"max-width:860px;margin:0 auto;text-align:center;\">\n      <p style=\"font:600 30px Inter;line-height:1.45;letter-spacing:-.015em;color:var(--ink);margin:0;\">It watches quietly, files what it's sure of, asks you once about what it isn't, remembers your answer forever, and slowly fades into the background — <span style=\"color:var(--primary);\">building your money's story without making you do the work.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== THE HONEST PART ===================== -->\n  <section style=\"background:var(--bg);padding:104px 40px 64px;border-top:1px solid var(--line);\">\n    <div style=\"max-width:720px;margin:0 auto;\">\n      <div style=\"font:600 13px Inter;letter-spacing:.18em;text-transform:uppercase;color:var(--attention);margin-bottom:20px;\">The honest part<\u002Fdiv>\n      <h2 style=\"font:800 38px Inter;line-height:1.12;letter-spacing:-.025em;color:var(--ink);margin:0 0 28px;\">Where this gets hard<\u002Fh2>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 8px;\">I don't want to end this like a fairy tale, because the real test of an idea is what it does when things get messy. So here are the hard edges — including the ones I genuinely can't fix.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"max-width:720px;margin:48px auto 0;display:flex;flex-direction:column;gap:20px;\">\n      <div style=\"background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:0 1px 2px rgba(20,24,31,.04),0 8px 22px rgba(20,24,31,.04);\">\n        <div style=\"font:700 18px Inter;color:var(--ink);margin-bottom:18px;\">The messy cases I <span style=\"color:var(--ok);\">can<\u002Fspan> design around<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"display:flex;gap:13px;\"><span style=\"flex:none;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-top:9px;\"><\u002Fspan><p style=\"font:400 17px Inter;line-height:1.6;color:#3a4049;margin:0;\"><strong style=\"color:var(--ink);font-weight:600;\">Paying a friend<\u002Fstrong> is never the same twice — rent one month, splitting dinner the next. So the app never sticks a label on a person. It treats it as money moving, and lets you say what it was only if it actually was a purchase.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;\"><span style=\"flex:none;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-top:9px;\"><\u002Fspan><p style=\"font:400 17px Inter;line-height:1.6;color:#3a4049;margin:0;\"><strong style=\"color:var(--ink);font-weight:600;\">A refund<\u002Fstrong> after a failed payment can look like two transactions. The app matches them up and cancels out the noise instead of scaring you with a double charge.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;\"><span style=\"flex:none;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-top:9px;\"><\u002Fspan><p style=\"font:400 17px Inter;line-height:1.6;color:#3a4049;margin:0;\"><strong style=\"color:var(--ink);font-weight:600;\">The forgotten chai.<\u002Fstrong> Ask too soon and you annoy people; ask too late and they've forgotten. My answer: don't ask about tiny amounts at all, and save the questions for spending that matters. Not a perfect answer — but there isn't one, and I'd rather be upfront.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:0 1px 2px rgba(20,24,31,.04),0 8px 22px rgba(20,24,31,.04);\">\n        <div style=\"font:700 18px Inter;color:var(--ink);margin-bottom:18px;\">The cases I honestly <span style=\"color:var(--attention);\">can't<\u002Fspan> fully solve<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"display:flex;gap:13px;\"><span style=\"flex:none;width:7px;height:7px;border-radius:50%;background:var(--attention);margin-top:9px;\"><\u002Fspan><p style=\"font:400 17px Inter;line-height:1.6;color:#3a4049;margin:0;\"><strong style=\"color:var(--ink);font-weight:600;\">Sometimes the payment carries no clue at all.<\u002Fstrong> No shop name, nothing — just money leaving. No app on earth can know what it was. Only you can. The best I can do is make this rare and make answering effortless. I can't make it never happen, and I won't pretend I can.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;\"><span style=\"flex:none;width:7px;height:7px;border-radius:50%;background:var(--attention);margin-top:9px;\"><\u002Fspan><p style=\"font:400 17px Inter;line-height:1.6;color:#3a4049;margin:0;\"><strong style=\"color:var(--ink);font-weight:600;\">When a shop changes its name,<\u002Fstrong> the app sees a stranger again and has to ask once more. One tap fixes it — but it can't magically know it's the same place.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;\"><span style=\"flex:none;width:7px;height:7px;border-radius:50%;background:var(--attention);margin-top:9px;\"><\u002Fspan><p style=\"font:400 17px Inter;line-height:1.6;color:#3a4049;margin:0;\"><strong style=\"color:var(--ink);font-weight:600;\">On iPhone,<\u002Fstrong> Apple simply doesn't let apps read your messages. So this works best on Android, and I'd rather say that plainly than oversell it.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:0 1px 2px rgba(20,24,31,.04),0 8px 22px rgba(20,24,31,.04);\">\n        <div style=\"font:700 18px Inter;color:var(--ink);margin-bottom:14px;\">And the parts bigger than one designer<\u002Fdiv>\n        <p style=\"font:400 17px Inter;line-height:1.7;color:#3a4049;margin:0;\">To recognise thousands of shops by name, you'd need a massive directory only a real company can build and maintain. And the moment an app starts <em>holding<\u002Fem> your money instead of just watching it, you're into banking licenses and regulators. I'm a designer. I can design the experience — the calm, the trust, the way it asks. I can't build the company-sized machinery underneath alone, and I won't pretend this is a weekend project. It isn't.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== HONEST SCREENS ROW ===================== -->\n  <section style=\"background:var(--bg);padding:24px 40px 96px;\">\n    <div style=\"max-width:1080px;margin:0 auto;display:flex;justify-content:center;gap:48px;flex-wrap:wrap;\">\n      <!-- Phone: I can't tell -->\n      <div style=\"width:291px;display:flex;flex-direction:column;align-items:center;\">\n        <div style=\"width:291px;height:616px;\">\n          <div style=\"transform:scale(0.70);transform-origin:top left;\">\n            <div style=\"width:416px;height:880px;background:#0c0d10;border-radius:50px;padding:11px;box-shadow:0 2px 6px rgba(0,0,0,.12),0 24px 50px rgba(20,24,31,.18);position:relative;\">\n              <div style=\"width:100%;height:100%;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;display:flex;flex-direction:column;\">\n                <div style=\"position:absolute;top:9px;left:50%;transform:translateX(-50%);width:104px;height:30px;background:#0c0d10;border-radius:16px;z-index:6;\"><\u002Fdiv>\n                <div style=\"height:52px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0;\"><span style=\"font:600 15px Inter;color:#23272e;letter-spacing:-.01em;\">9:41<\u002Fspan><div style=\"display:flex;align-items:center;gap:7px;\"><svg width=\"18\" height=\"11\" viewBox=\"0 0 18 11\" fill=\"#23272e\"><rect x=\"0\" y=\"7\" width=\"3\" height=\"4\" rx=\"1\"><\u002Frect><rect x=\"5\" y=\"5\" width=\"3\" height=\"6\" rx=\"1\"><\u002Frect><rect x=\"10\" y=\"2.5\" width=\"3\" height=\"8.5\" rx=\"1\"><\u002Frect><rect x=\"15\" y=\"0\" width=\"3\" height=\"11\" rx=\"1\"><\u002Frect><\u002Fsvg><svg width=\"17\" height=\"12\" viewBox=\"0 0 17 12\" fill=\"#23272e\"><path d=\"M8.5 3.2c2.4 0 4.6.9 6.2 2.4l1.4-1.6A11 11 0 0 0 8.5 1 11 11 0 0 0 1.4 4l1.4 1.6A9 9 0 0 1 8.5 3.2zM8.5 6.6c1.4 0 2.7.5 3.7 1.4l1.4-1.6a8 8 0 0 0-10.2 0l1.4 1.6c1-.9 2.3-1.4 3.7-1.4zM8.5 10l2.1-2.4a4 4 0 0 0-4.2 0L8.5 10z\"><\u002Fpath><\u002Fsvg><svg width=\"26\" height=\"13\" viewBox=\"0 0 26 13\"><rect x=\"0.5\" y=\"0.5\" width=\"22\" height=\"12\" rx=\"3.5\" fill=\"none\" stroke=\"#23272e\" stroke-opacity=\".35\"><\u002Frect><rect x=\"2\" y=\"2\" width=\"17\" height=\"9 ;display:flex;flex-direction:column;gap:10px;\"><div style=\"text-align:center;font:600 14px Inter;color:#fff;padding:14px;border-radius:13px;background:var(--primary);\">Tell me what it was<\u002Fdiv><div style=\"text-align:center;font:600 14px Inter;color:var(--ink);padding:14px;border-radius:13px;border:1px solid var(--line);background:var(--paper);\">Leave it as Uncategorised<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:138px;height:5px;border-radius:3px;background:var(--ink);opacity:.22;z-index:6;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;margin-top:18px;\"><div style=\"font:600 16px Inter;color:var(--ink);\">When there's no clue, it says so<\u002Fdiv><div style=\"font:400 14px Inter;color:var(--muted);margin-top:4px;line-height:1.5;\">No fake guess. It hands the one decision back to you.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Phone: P2P -->\n      <div style=\"width:291px;display:flex;flex-direction:column;align-items:center;\">\n        <div style=\"width:291px;height:616px;\">\n          <div style=\"transform:scale(0.70);transform-origin:top left;\">\n            <div style=\"width:416px;height:880px;background:#0c0d10;border-radius:50px;padding:11px;box-shadow:0 2px 6px rgba(0,0,0,.12),0 24px 50px rgba(20,24,31,.18);position:relative;\">\n              <div style=\"width:100%;height:100%;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;display:flex;flex-direction:column;\">\n                <div style=\"position:absolute;top:9px;left:50%;transform:translateX(-50%);width:104px;height:30px;background:#0c0d10;border-radius:16px;z-index:6;\"><\u002Fdiv>\n                <div style=\"height:52px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0;\"><span style=\"font:600 15px Inter;color:#23272e;letter-spacing:-.01em;\">9:41<\u002Fspan><div style=\"display:flex;align-items:center;gap:7px;\"><svg width=\"18\" height=\"11\" viewBox=\"0 0 18 11\" fill=\"#23272e\"><rect x=\"0\" y=\"7\" width=\"3\" height=\"4\" rx=\"1\"><\u002Frect><rect x=\"5\" y=\"5\" width=\"3\" height=\"6\" rx=\"1\"><\u002Frect><rect x=\"10\" y=\"2.5\" width=\"3\" height=\"8.5\" rx=\"1\"><\u002Frect><rect x=\"15\" y=\"0\" width=\"3\" height=\"11\" rx=\"1\"><\u002Frect><\u002Fsvg><svg width=\"17\" height=\"12\" viewBox=\"0 0 17 12\" fill=\"#23272e\"><path d=\"M8.5 3.2c2.4 0 4.6.9 6.2 2.4l1.4-1.6A11 11 0 0 0 8.5 1 11 11 0 0 0 1.4 4l1.4 1.6A9 9 0 0 1 8.5 3.2zM8.5 6.6c1.4 0 2.7.5 3.7 1.4l1.4-1.6a8 8 0 0 0-10.2 0l1.4 1.6c1-.9 2.3-1.4 3.7-1.4zM8.5 10l2.1-2.4a4 4 0 0 0-4.2 0L8.5 10z\"><\u002Fpath><\u002Fsvg><svg width=\"26\" height=\"13\" viewBox=\"0 0 26 13\"><rect x=\"0.5\" y=\"0.5\" width=\"22\" height=\"12\" rx=\"3.5\" fill=\"none\" stroke=\"#23272e\" stroke-opacity=\".35\"><\u002Frect><rect x=\"2\" y=\"2\" width=\"17\" height=\"9\" rx=\"1.8\" fill=\"#23272e\"><\u002Frect><rect x=\"24\" y=\"4\" width=\"2\" height=\"5\" rx=\"1\" fill=\"#23272e\" fill-opacity=\".35\"><\u002Frect><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n                <div style=\"height:52px;flex:none;display:flex;align-items:center;gap:6px;padding:0 16px;\"><div style=\"width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--ink);\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv><span style=\"font:700 16px Inter;color:var(--ink);\">One payment<\u002Fspan><\u002Fdiv>\n                <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 22px 40px;\">\n                  <div style=\"background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 1px 2px rgba(20,24,31,.04),0 10px 28px rgba(20,24,31,.07);\">\n                    <div style=\"display:flex;align-items:baseline;justify-content:space-between;\"><span style=\"font:600 30px Manrope;color:var(--ink);letter-spacing:-.02em;\">₹500<\u002Fspan><span style=\"font:500 12px Inter;color:var(--faint);\">Today · 7:20 PM<\u002Fspan><\u002Fdiv>\n                    <div style=\"margin-top:16px;display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);\"><div style=\"width:38px;height:38px;border-radius:50%;background:var(--primary-tint);flex:none;display:flex;align-items:center;justify-content:center;font:700 14px Inter;color:var(--primary);\">R<\u002Fdiv><div style=\"flex:1;display:flex;flex-direction:column;gap:2px;\"><span style=\"font:600 13.5px Inter;color:var(--ink);\">Paid to Rahul<\u002Fspan><span style=\"font:500 11.5px 'Roboto Mono',monospace;color:var(--faint);\">rahul@oksbi<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                    <div style=\"margin-top:16px;display:flex;flex-direction:column;gap:6px;\"><span style=\"font:700 17px Inter;color:var(--ink);letter-spacing:-.01em;line-height:1.3;\">Was this spending, or money to a friend?<\u002Fspan><span style=\"font:400 13.5px Inter;color:var(--muted);line-height:1.5;\">I don't count money between people as spending unless you say so.<\u002Fspan><\u002Fdiv>\n                    <div style=\"margin-top:20px;display:flex;flex-direction:column;gap:10px;\"><div style=\"text-align:center;font:600 14px Inter;color:#fff;padding:14px;border-radius:13px;background:var(--primary);\">It was spending — pick a category<\u002Fdiv><div style=\"text-align:center;font:600 14px Inter;color:var(--ink);padding:14px;border-radius:13px;border:1px solid var(--line);background:var(--paper);\">Just a transfer<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:138px;height:5px;border-radius:3px;background:var(--ink);opacity:.22;z-index:6;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;margin-top:18px;\"><div style=\"font:600 16px Inter;color:var(--ink);\">Money to a friend isn't spending<\u002Fdiv><div style=\"font:400 14px Inter;color:var(--muted);margin-top:4px;line-height:1.5;\">It never labels a person — it keeps your totals honest.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Phone: Permission -->\n      <div style=\"width:291px;display:flex;flex-direction:column;align-items:center;\">\n        <div style=\"width:291px;height:616px;\">\n          <div style=\"transform:scale(0.70);transform-origin:top left;\">\n            <div style=\"width:416px;height:880px;background:#0c0d10;border-radius:50px;padding:11px;box-shadow:0 2px 6px rgba(0,0,0,.12),0 24px 50px rgba(20,24,31,.18);position:relative;\">\n              <div style=\"width:100%;height:100%;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;display:flex;flex-direction:column;\">\n                <div style=\"position:absolute;top:9px;left:50%;transform:translateX(-50%);width:104px;height:30px;background:#0c0d10;border-radius:16px;z-index:6;\"><\u002Fdiv>\n                <div style=\"height:52px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0;\"><span style=\"font:600 15px Inter;color:#23272e;letter-spacing:-.01em;\">9:41<\u002Fspan><div style=\"display:flex;align-items:center;gap:7px;\"><svg width=\"18\" height=\"11\" viewBox=\"0 0 18 11\" fill=\"#23272e\"><rect x=\"0\" y=\"7\" width=\"3\" height=\"4\" rx=\"1\"><\u002Frect><rect x=\"5\" y=\"5\" width=\"3\" height=\"6\" rx=\"1\"><\u002Frect><rect x=\"10\" y=\"2.5\" width=\"3\" height=\"8.5\" rx=\"1\"><\u002Frect><rect x=\"15\" y=\"0\" width=\"3\" height=\"11\" rx=\"1\"><\u002Frect><\u002Fsvg><svg width=\"17\" height=\"12\" viewBox=\"0 0 17 12\" fill=\"#23272e\"><path d=\"M8.5 3.2c2.4 0 4.6.9 6.2 2.4l1.4-1.6A11 11 0 0 0 8.5 1 11 11 0 0 0 1.4 4l1.4 1.6A9 9 0 0 1 8.5 3.2zM8.5 6.6c1.4 0 2.7.5 3.7 1.4l1.4-1.6a8 8 0 0 0-10.2 0l1.4 1.6c1-.9 2.3-1.4 3.7-1.4zM8.5 10l2.1-2.4a4 4 0 0 0-4.2 0L8.5 10z\"><\u002Fpath><\u002Fsvg><svg width=\"26\" height=\"13\" viewBox=\"0 0 26 13\"><rect x=\"0.5\" y=\"0.5\" width=\"22\" height=\"12\" rx=\"3.5\" fill=\"none\" stroke=\"#23272e\" stroke-opacity=\".35\"><\u002Frect><rect x=\"2\" y=\"2\" width=\"17\" height=\"9\" rx=\"1.8\" fill=\"#23272e\"><\u002Frect><rect x=\"24\" y=\"4\" width=\"2\" height=\"5\" rx=\"1\" fill=\"#23272e\" fill-opacity=\".35\"><\u002Frect><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:48px 32px 40px;\">\n                  <div style=\"width:84px;height:84px;border-radius:24px;background:var(--primary-tint);display:flex;align-items:center;justify-content:center;color:var(--primary);\"><svg width=\"40\" height=\"40\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l7 2.6v5.2c0 4.6-3 7.7-7 9.2-4-1.5-7-4.6-7-9.2V5.6L12 3z\"><\u002Fpath><path d=\"M9 11.8l2 2 4-4.2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <span style=\"font:700 21px Inter;color:var(--ink);letter-spacing:-.01em;margin-top:24px;line-height:1.3;\">Let me read your payment texts<\u002Fspan>\n                  <span style=\"font:400 14px Inter;color:var(--muted);line-height:1.6;max-width:262px;margin-top:12px;\">Your bank already texts you after every payment. I read those to sort your spending — and they never leave your phone.<\u002Fspan>\n                  <div style=\"width:100%;display:flex;flex-direction:column;gap:11px;margin-top:32px;\"><div style=\"text-align:center;font:600 15px Inter;color:#fff;padding:15px;border-radius:14px;background:var(--primary);\">Allow on this phone<\u002Fdiv><div style=\"text-align:center;font:600 14px Inter;color:var(--ink);padding:14px;border-radius:14px;border:1px solid var(--line);background:var(--paper);\">Not now<\u002Fdiv><\u002Fdiv>\n                  <span style=\"font:400 12px Inter;color:var(--faint);line-height:1.5;max-width:240px;margin-top:18px;\">Works on Android. Apple limits this on iPhone, so iPhone reads less.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:138px;height:5px;border-radius:3px;background:var(--ink);opacity:.22;z-index:6;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;margin-top:18px;\"><div style=\"font:600 16px Inter;color:var(--ink);\">It all stays on your phone<\u002Fdiv><div style=\"font:400 14px Inter;color:var(--muted);margin-top:4px;line-height:1.5;\">The privacy promise, stated plainly — iPhone limit and all.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== WHERE IT LANDS ===================== -->\n  <section style=\"padding:108px 40px;\">\n    <div style=\"max-width:720px;margin:0 auto;\">\n      <div style=\"font:600 13px Inter;letter-spacing:.18em;text-transform:uppercase;color:var(--primary);margin-bottom:20px;\">Where it lands<\u002Fdiv>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 24px;\">I didn't set out to build a \"finance app.\" Honestly, the phrase makes most people's eyes glaze over.<\u002Fp>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 24px;\">I set out to give people back a small thing they lost somewhere between the piggy bank and the QR code: the simple feeling of knowing where your money went — without having to count it.<\u002Fp>\n      <p style=\"font:400 19px Inter;line-height:1.78;color:#3a4049;margin:0 0 40px;\">The app doesn't ask you to be disciplined. It doesn't make you log, or budget, or feel guilty. It just sits quietly, pays attention, asks once in a while, and slowly hands your money's story back to you.<\u002Fp>\n      <blockquote style=\"margin:0;padding:0;font:700 36px Inter;line-height:1.25;letter-spacing:-.025em;color:var(--ink);\">That's the whole point. Not to track your spending.<br><span style=\"color:var(--primary);\">To make it visible again<\u002Fspan> — gently enough that you'd actually let it.<\u002Fblockquote>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FOOTER ===================== -->\n  <footer style=\"background:#16181d;padding:56px 40px;\">\n    <div style=\"max-width:720px;margin:0 auto;\">\n      <div style=\"display:flex;height:10px;width:100%;border-radius:6px;overflow:hidden;margin-bottom:28px;\">\n        <div style=\"flex:5400;background:#3a5bd9;\"><\u002Fdiv><div style=\"flex:3100;background:#5573df;\"><\u002Fdiv><div style=\"flex:2800;background:#788ce7;\"><\u002Fdiv><div style=\"flex:2600;background:#9aa9ef;\"><\u002Fdiv><div style=\"flex:1900;background:var(--attention);\"><\u002Fdiv><div style=\"flex:2440;background:#cdd5f6;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font:400 15px Inter;line-height:1.7;color:#8a92a0;margin:0 0 20px;font-style:italic;\">This is a concept I designed to think through a hard problem, not a finished product. The interesting work wasn't the screens — it was deciding when a machine should stay quiet, when it should admit it doesn't know, and how to ask for help without becoming the thing you delete.<\u002Fp>\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\"><rect x=\"2\" y=\"11\" width=\"4\" height=\"11\" rx=\"1.6\" fill=\"#5573df\"><\u002Frect><rect x=\"10\" y=\"5\" width=\"4\" height=\"17\" rx=\"1.6\" fill=\"#3a5bd9\"><\u002Frect><rect x=\"18\" y=\"14\" width=\"4\" height=\"8\" rx=\"1.6\" fill=\"#b9772a\"><\u002Frect><\u002Fsvg>\n        <span style=\"font:600 14px Inter;color:#c4c9d2;\">Where did my money go?<\u002Fspan>\n        <span style=\"opacity:.4;color:#8a92a0;\">·<\u002Fspan>\n        <span style=\"font:500 14px Inter;color:#8a92a0;\">Concept case study, 2024<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Calm blue&quot;,&quot;Slate&quot;,&quot;Teal&quot;],&quot;default&quot;:&quot;Calm blue&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Amber&quot;,&quot;Terracotta&quot;],&quot;default&quot;:&quot;Amber&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() { this.applyTheme(); }\n  componentDidUpdate() { this.applyTheme(); }\n  applyTheme() {\n    const themes = {\n      'Calm blue': { p: '#3a5bd9', t: '#eef1fc', t2: '#dfe5fb' },\n      'Slate':     { p: '#4a5a78', t: '#eef0f4', t2: '#dde2ea' },\n      'Teal':      { p: '#1f7a7e', t: '#e5f2f2', t2: '#cde8e8' }\n    };\n    const accents = {\n      'Amber':      { a: '#b9772a', bg: '#fbf3e8', ln: '#ecdcc1' },\n      'Terracotta': { a: '#b3553f', bg: '#f8ebe6', ln: '#ecd3cb' }\n    };\n    const th = themes[this.props.theme] || themes['Calm blue'];\n    const ac = accents[this.props.accent] || accents['Amber'];\n    const r = document.documentElement.style;\n    r.setProperty('--primary', th.p);\n    r.setProperty('--primary-tint', th.t);\n    r.setProperty('--primary-tint2', th.t2);\n    r.setProperty('--attention', ac.a);\n    r.setProperty('--attention-bg', ac.bg);\n    r.setProperty('--attention-line', ac.ln);\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
